name: CI

# Catch regressions before they reach a deploy: typecheck + unit tests are hard
# gates; lint is reported but non-blocking (pre-existing react-hooks/set-state-in-
# effect debt in app/widgets/page.tsx — clean up, then flip to blocking).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npm test
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
