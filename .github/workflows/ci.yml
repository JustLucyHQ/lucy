name: CI

# Catch regressions before they reach a deploy: typecheck, unit tests, and lint
# are all hard gates (the project is lint-clean — keep it that way).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npm test
      - name: Lint
        run: npm run lint
